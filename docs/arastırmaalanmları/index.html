<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent:#0B5ED7; --accent2:#083B8A;
      --text:#0F172A; --muted:#475569;
      --ice:#EBF3FF; --ice2:#C7DCFF;
      --stroke:rgba(15,23,42,.10);
      --stroke-hover:rgba(11,94,215,.22);
      --shadow-card:0 12px 28px rgba(2,6,23,.10);
      --shadow-hover:0 18px 44px rgba(2,6,23,.14);
      --r1:18px; --r2:14px;
      --space-xs:4px; --space-sm:8px; --space-md:14px; --space-lg:18px; --space-xl:32px; --space-2xl:56px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Work Sans", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px at 10% 0%, rgba(11,94,215,0.15), transparent 60%),
        radial-gradient(800px at 90% 10%, rgba(8,59,138,0.12), transparent 55%),
        linear-gradient(180deg, #ffffff, #f8fafc);
    }
    .wrap{ max-width:1120px; margin:0 auto; padding: var(--space-xl) 18px var(--space-2xl); }

    /* Header */
    .kicker{
      display:flex; align-items:center; gap:10px;
      font-size:.78rem; letter-spacing:.12em; text-transform:uppercase;
      color:var(--muted);
      margin-bottom:10px;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background: rgba(11,94,215,0.22);
      box-shadow: 0 0 0 5px rgba(11,94,215,0.09);
      flex:0 0 auto;
    }
    h1{
      margin:0;
      font-weight:900;
      letter-spacing:.2px;
      font-size:clamp(1.35rem, 2.2vw, 1.8rem);
      line-height:1.2;
    }
    .sub{
      margin:10px 0 0;
      color:var(--muted);
      line-height:1.6;
      max-width:68ch;
      font-size: .98rem;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, #0B5ED7 40%, #083B8A 60%, transparent);
      margin: 16px 0 18px;
      opacity:.75;
    }

    /* Controls */
    .controls{
      display:flex; flex-wrap:wrap; gap:10px;
      align-items:center;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      padding: 10px 0;
      backdrop-filter: blur(8px);
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
      border-bottom: 1px solid rgba(15,23,42,.06);
      z-index: 5;
    }
    .search{
      flex:1 1 260px;
      display:flex; align-items:center; gap:10px;
      padding: 10px 12px;
      border:1px solid var(--stroke);
      border-radius: 999px;
      background: rgba(235,243,255,.55);
    }
    .search input{
      width:100%;
      border:0; outline:0;
      font-size:.95rem;
      background: transparent;
      color: var(--text);
    }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; }
    .chip{
      border:1px solid var(--stroke);
      background: rgba(11,94,215,0.06);
      color: rgba(8,59,138,0.92);
      padding: 7px 10px;
      border-radius: 999px;
      font-size:.85rem;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      transition: .18s ease;
    }
    .chip[aria-pressed="true"]{
      background: rgba(11,94,215,0.12);
      border-color: rgba(11,94,215,0.28);
    }

    /* Grid */
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 640px){ .grid{ grid-template-columns: 1fr 1fr; gap: 14px; } }
    @media (min-width: 1024px){ .grid{ grid-template-columns: 1fr 1fr 1fr; } }

    .card{
      position:relative;
      border:1px solid var(--stroke);
      border-radius: var(--r1);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,252,0.92));
      box-shadow: var(--shadow-card);
      padding: 14px 14px 16px;
      transition: .18s ease;
      overflow:hidden;
    }
    .card:hover{
      transform: translateY(-3px);
      border-color: var(--stroke-hover);
      box-shadow: var(--shadow-hover);
    }
    .top{
      display:flex; align-items:flex-start; gap:10px;
      margin-bottom: 10px;
    }
    .icon{
      width:38px; height:38px; border-radius: 50%;
      display:grid; place-items:center;
      background: rgba(11,94,215,0.10);
      border: 1px solid rgba(15,23,42,.08);
      flex:0 0 auto;
    }
    .title{
      margin:0;
      font-size:1.02rem;
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.25;
    }
    .meta{
      margin:6px 0 0;
      color: var(--muted);
      font-size: .88rem;
      line-height:1.55;
    }

    .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top: 10px; }
    .tag{
      font-size:.78rem;
      padding: 5px 8px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: rgba(235,243,255,.65);
      color: rgba(15,23,42,.78);
      font-weight:700;
    }
    .accentline{
      height:2px; width:56px;
      border-radius: 999px;
      background: linear-gradient(90deg, #0B5ED7, rgba(11,94,215,0));
      margin-top: 12px;
      opacity:.95;
    }

    .actions{
      display:flex; gap:10px; margin-top: 12px;
      align-items:center;
    }
    .btn{
      border:1px solid rgba(11,94,215,0.22);
      background: rgba(11,94,215,0.08);
      color: var(--accent2);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight:900;
      font-size:.9rem;
      cursor:pointer;
      transition: .18s ease;
    }
    .btn:hover{ background: rgba(11,94,215,0.12); }
    .btn:active{ transform: translateY(1px); }

    /* Drawer */
    .overlay{
      position:fixed; inset:0;
      background: rgba(2,6,23,.35);
      opacity:0; pointer-events:none;
      transition:.18s ease;
      z-index: 20;
    }
    .overlay.open{ opacity:1; pointer-events:auto; }

    .drawer{
      position:fixed;
      top:0; right:0; height:100%;
      width:min(520px, 92vw);
      background: #fff;
      border-left: 1px solid rgba(15,23,42,.10);
      box-shadow: -18px 0 50px rgba(2,6,23,.16);
      transform: translateX(100%);
      transition: .18s ease;
      z-index: 25;
      display:flex; flex-direction:column;
    }
    .drawer.open{ transform: translateX(0); }

    .drawerHead{
      padding: 16px 16px 12px;
      background:
        radial-gradient(700px at 20% 0%, rgba(11,94,215,0.12), transparent 55%),
        linear-gradient(180deg, #fff, #f8fafc);
      border-bottom: 1px solid rgba(15,23,42,.08);
    }
    .drawerTitle{
      margin:0;
      font-size: 1.08rem;
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.2;
    }
    .drawerSub{
      margin:8px 0 0;
      color: var(--muted);
      line-height:1.6;
      font-size:.92rem;
    }
    .closeRow{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .xbtn{
      border:1px solid var(--stroke);
      background: rgba(235,243,255,.55);
      width:40px; height:40px;
      border-radius: 12px;
      cursor:pointer;
      transition:.18s ease;
      display:grid; place-items:center;
    }
    .xbtn:hover{ border-color: var(--stroke-hover); transform: translateY(-1px); }

    .drawerBody{
      padding: 14px 16px 18px;
      overflow:auto;
    }
    .secTitle{
      margin: 14px 0 8px;
      font-size: .78rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: var(--muted);
      font-weight:800;
    }
    ul{ margin: 0; padding-left: 18px; color: var(--text); }
    li{ margin: 6px 0; line-height:1.55; color: rgba(15,23,42,.92); }

    .miniGrid{
      display:grid; gap:10px;
      grid-template-columns: 1fr;
      margin-top: 10px;
    }
    .mini{
      border:1px solid var(--stroke);
      border-radius: var(--r2);
      background: rgba(235,243,255,.40);
      padding: 12px;
    }
    .mini b{ display:block; font-weight:900; margin-bottom:4px; }
    .mini span{ color: var(--muted); font-size:.92rem; line-height:1.55; display:block; }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; animation:none !important; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="kicker"><span class="dot"></span> Araştırma Ekosistemi</div>
    <h1>Araştırma Alanları</h1>
    <p class="sub">
      Alanları hızlıca keşfetmek için arama yapabilir, filtreleyebilir ve her başlık için “detay” panelinden odak noktalarını görüntüleyebilirsin.
    </p>

    <div class="divider"></div>

    <div class="controls" aria-label="Filtre ve arama">
      <div class="search" role="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="rgba(8,59,138,.8)" stroke-width="2"/>
          <path d="M16.5 16.5 21 21" stroke="rgba(8,59,138,.8)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="q" placeholder="Örn: hegzaferrit, tribokorozyon, VSM..." />
      </div>

      <div class="chips" id="chips" aria-label="Kategori filtreleri"></div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <aside class="drawer" id="drawer" aria-label="Araştırma alanı detay paneli">
    <div class="drawerHead">
      <div class="closeRow">
        <div>
          <h2 class="drawerTitle" id="dTitle">—</h2>
          <p class="drawerSub" id="dSub">—</p>
        </div>
        <button class="xbtn" id="close" aria-label="Kapat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6 18 18M18 6 6 18" stroke="rgba(15,23,42,.85)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="drawerBody">
      <div class="miniGrid" id="mini"></div>

      <div class="secTitle">Odak Noktaları</div>
      <ul id="dPoints"></ul>

      <div class="secTitle">Yöntem / Altyapı</div>
      <ul id="dMethods"></ul>
    </div>
  </aside>

  <script>
    const AREAS = [
      {
        id:"hexaferrites",
        title:"Kalıcı Mıknatıslar ve Hekzaferritler",
        sub:"Sr-hegzaferrit tabanlı manyetik tozlar, katkılama stratejileri ve kalıcı mıknatıs performansı.",
        category:"Manyetik Malzemeler",
        tags:["SrFe₁₂O₁₉","Katkılama","Koersivite"],
        points:[
          "Katkılama (Al, Cr, Mn, In vb.) ile Hc/Ms optimizasyonu",
          "Tane boyutu, faz saflığı ve mikro-yapı kontrolü",
          "Uygulama odaklı manyetik performans doğrulama"
        ],
        methods:["XRD faz analizi","SEM/TEM morfoloji","VSM histerezis parametreleri","Isıl/kimyasal kararlılık testleri"]
      },
      {
        id:"spinel",
        title:"Spinel Ferrit Nanoparçacıklar ve Manyetik Oksitler",
        sub:"Spinel ferritler ve manyetik oksitlerde sentez–morfoloji–manyetik özellik ilişkileri.",
        category:"Manyetik Malzemeler",
        tags:["Spinel","Nanoparçacık","Manyetik Oksit"],
        points:[
          "Sentez parametrelerinin tane boyutu ve dağılıma etkisi",
          "Yüzey modifikasyonu ve stabilite",
          "Manyetik yanıtın uygulamaya göre ayarlanması"
        ],
        methods:["Hidrotermal/sol-jel sentez","SEM/TEM","XRD","VSM"]
      },
      {
        id:"hea",
        title:"Yüksek Entropili Alaşımlar (HEA) ve Manyetik Davranış",
        sub:"Çok bileşenli alaşımlarda faz oluşumu, mikro yapı ve fonksiyonel (manyetik/tribolojik) davranış.",
        category:"Alaşımlar",
        tags:["HEA","Faz","Fonksiyonel Davranış"],
        points:[
          "Kompozisyon–faz haritalama ve tasarım stratejileri",
          "Mekanik/tribolojik performans ile mikro yapı ilişkisi",
          "Manyetik davranışın bileşimle ayarlanması"
        ],
        methods:["Toz metalurjisi / ergitme","Mikroyapı karakterizasyonu","Mekanik testler","Gerekli durumda manyetik ölçümler"]
      },
      {
        id:"softmag",
        title:"Yumuşak Manyetik Şeritler ve Manyetik Algılayıcılar",
        sub:"Yumuşak manyetik malzemeler, şerit üretimi ve sensör/algılayıcı uygulamaları.",
        category:"Manyetik Malzemeler",
        tags:["Yumuşak Manyetik","Şerit","Sensör"],
        points:[
          "Manyetik kayıp ve geçirgenlik optimizasyonu",
          "Şerit üretim parametrelerinin mikro yapıya etkisi",
          "Algılayıcı uygulamalarına yönelik tasarım"
        ],
        methods:["Hızlı katılaştırma temelli üretim","Mikroyapı analizi","Manyetik karakterizasyon"]
      },
      {
        id:"advanced",
        title:"İleri Üretim ve Hızlı Katılaştırma",
        sub:"Mekanokimya ve melt-spinning gibi yöntemlerle yapı–özellik kontrolü ve ölçeklenebilir üretim.",
        category:"Üretim & Proses",
        tags:["Mekanokimya","Melt-Spinning","Proses"],
        points:[
          "Proses parametrelerinin (hız, sıcaklık, süre) etkileri",
          "Hızlı katılaştırma ile ince mikro yapı elde edilmesi",
          "Uygulama odaklı malzeme tasarımı"
        ],
        methods:["Melt-spinning/rapid solidification","Öğütme ve toz hazırlama","Karakterizasyon akışları"]
      },
      {
        id:"surface",
        title:"Yüzey Mühendisliği, Kaplamalar ve Tribokorozyon",
        sub:"Yüzey performansını artıran kaplama/işlem stratejileri ve tribokorozyon dayanımı.",
        category:"Yüzey & Triboloji",
        tags:["Kaplama","Tribokorozyon","Yüzey"],
        points:[
          "Kaplama mimarisi ve yapışma optimizasyonu",
          "Aşınma + korozyon etkileşim mekanizmaları",
          "Uygulama koşullarına göre yüzey tasarımı"
        ],
        methods:["Yüzey karakterizasyonu","Triboloji testleri","Elektrokimyasal değerlendirmeler (varsa)"]
      },
      {
        id:"energy",
        title:"Enerji Malzemeleri (Mg–Ni, Hidrojen Depolama ve Korozyon)",
        sub:"Mg–Ni sistemleri ve enerji uygulamalarında depolama/kararlılık/korozyon odaklı çalışmalar.",
        category:"Enerji",
        tags:["Mg–Ni","H₂ Depolama","Korozyon"],
        points:[
          "Depolama kapasitesi ve kinetik iyileştirme yaklaşımları",
          "Mikroyapı–reaktivite ilişkisi",
          "Korozyon ve çevresel dayanım değerlendirmesi"
        ],
        methods:["Alaşım/toz hazırlama","Mikroyapı analizi","Gerekli durumda elektrokimya"]
      }
    ];

    const CATS = ["Tümü", ...Array.from(new Set(AREAS.map(a=>a.category)))];

    const els = {
      q: document.getElementById("q"),
      grid: document.getElementById("grid"),
      chips: document.getElementById("chips"),
      overlay: document.getElementById("overlay"),
      drawer: document.getElementById("drawer"),
      close: document.getElementById("close"),
      dTitle: document.getElementById("dTitle"),
      dSub: document.getElementById("dSub"),
      dPoints: document.getElementById("dPoints"),
      dMethods: document.getElementById("dMethods"),
      mini: document.getElementById("mini"),
    };

    let activeCat = "Tümü";

    function iconSVG(){
      return `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2v6m0 8v6M2 12h6m8 0h6" stroke="rgba(8,59,138,.9)" stroke-width="2" stroke-linecap="round"/>
          <path d="M7.2 7.2 9.9 9.9m4.2 4.2 2.7 2.7M16.8 7.2 14.1 9.9m-4.2 4.2-2.7 2.7" stroke="rgba(11,94,215,.65)" stroke-width="2" stroke-linecap="round"/>
        </svg>`;
    }

    function renderChips(){
      els.chips.innerHTML = CATS.map(cat => `
        <button class="chip" data-cat="${cat}" aria-pressed="${cat===activeCat}">
          ${cat}
        </button>
      `).join("");
      els.chips.querySelectorAll(".chip").forEach(b=>{
        b.addEventListener("click", ()=>{
          activeCat = b.dataset.cat;
          renderChips();
          renderGrid();
        });
      });
    }

    function matches(area, query){
      if(!query) return true;
      const t = (area.title + " " + area.sub + " " + area.tags.join(" ") + " " + area.points.join(" ") + " " + area.methods.join(" ")).toLowerCase();
      return t.includes(query.toLowerCase());
    }

    function filtered(){
      const q = els.q.value.trim();
      return AREAS.filter(a => (activeCat==="Tümü" || a.category===activeCat) && matches(a, q));
    }

    function renderGrid(){
      const list = filtered();
      els.grid.innerHTML = list.map(a => `
        <article class="card">
          <div class="top">
            <div class="icon">${iconSVG()}</div>
            <div>
              <h3 class="title">${a.title}</h3>
              <p class="meta">${a.sub}</p>
            </div>
          </div>

          <div class="tags">
            ${a.tags.map(t=>`<span class="tag">${t}</span>`).join("")}
          </div>

          <div class="actions">
            <button class="btn" data-open="${a.id}">Detay</button>
          </div>

          <div class="accentline"></div>
        </article>
      `).join("");

      els.grid.querySelectorAll("[data-open]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const id = btn.dataset.open;
          openDrawer(AREAS.find(x=>x.id===id));
        });
      });
    }

    function openDrawer(a){
      els.dTitle.textContent = a.title;
      els.dSub.textContent = a.sub;

      els.mini.innerHTML = `
        <div class="mini"><b>Kategori</b><span>${a.category}</span></div>
        <div class="mini"><b>Ana Etiketler</b><span>${a.tags.join(" • ")}</span></div>
      `;

      els.dPoints.innerHTML = a.points.map(p=>`<li>${p}</li>`).join("");
      els.dMethods.innerHTML = a.methods.map(m=>`<li>${m}</li>`).join("");

      els.overlay.classList.add("open");
      els.drawer.classList.add("open");
      els.overlay.setAttribute("aria-hidden","false");
    }

    function closeDrawer(){
      els.overlay.classList.remove("open");
      els.drawer.classList.remove("open");
      els.overlay.setAttribute("aria-hidden","true");
    }

    els.close.addEventListener("click", closeDrawer);
    els.overlay.addEventListener("click", closeDrawer);
    window.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeDrawer(); });

    els.q.addEventListener("input", renderGrid);

    renderChips();
    renderGrid();
  </script>
</body>
</html>
