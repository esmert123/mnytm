<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TÜBİTAK Projeleri | MANYETAM</title>
  <meta name="description" content="MANYETAM TÜBİTAK destekli araştırma projeleri — kategoriye göre filtrelenebilir." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <main class="container main-wrap">

    <!-- Filter Panel -->
    <section class="filter-panel" aria-label="Filtreler">
      <div class="filter-grid">
        <div class="search-wrap">
          <svg class="search-ico" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="5.5" stroke="#94a3b8" stroke-width="1.7"/>
            <path d="M13.2 13.2L17 17" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          <input id="qSearch" type="text" class="f-input f-input--search"
            placeholder="Proje adı, anahtar kelime..." autocomplete="off"/>
        </div>
        <div class="f-field">
          <label class="f-label" for="qCategory">Kategori</label>
          <select id="qCategory" class="f-select">
            <option value="">Tümü</option>
          </select>
        </div>
        <div class="f-field">
          <label class="f-label" for="qStatus">Durum</label>
          <select id="qStatus" class="f-select">
            <option value="">Tümü</option>
            <option value="done">Tamamlandı</option>
            <option value="ongoing">Devam Ediyor</option>
          </select>
        </div>
        <button id="btnFilter" class="btn-primary" type="button">
          <svg viewBox="0 0 18 18" fill="none" width="15" height="15">
            <path d="M2 4h14M5 9h8M8 14h2" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Filtrele
        </button>
      </div>
    </section>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stats-left">
        <span class="stats-dot"></span>
        <span>Toplam <strong id="countTotal">0</strong> proje</span>
        <span class="stats-pipe">|</span>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <circle cx="8" cy="8" r="6" stroke="#16a34a" stroke-width="1.6"/>
          <path d="M5.5 8.3l1.8 1.8 3.2-3.6" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span><strong id="countDone">0</strong> tamamlandı</span>
        <span class="stats-pipe">|</span>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <circle cx="8" cy="8" r="6" stroke="#d97706" stroke-width="1.6"/>
          <path d="M8 5v4M8 11v.5" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span><strong id="countOngoing">0</strong> devam ediyor</span>
      </div>
      <div class="stats-right">
        <button id="btnClear" class="exp-btn exp-btn--clear" type="button">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Temizle
        </button>
      </div>
    </div>

    <!-- Project List -->
    <section id="projectList" class="project-list" aria-live="polite"></section>

    <!-- Empty State -->
    <template id="tplEmpty">
      <div class="state-box">
        <div class="state-ico">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="#cbd5e1" stroke-width="2"/>
            <circle cx="21" cy="21" r="8" stroke="#94a3b8" stroke-width="2.5"/>
            <path d="M27 27l8 8" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h3>Sonuç bulunamadı</h3>
        <p>Filtreleri değiştirip tekrar deneyebilirsiniz.</p>
      </div>
    </template>

    <!-- Error State -->
    <template id="tplError">
      <div class="state-box state-box--err">
        <div class="state-ico">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <path d="M24 8L4 40h40L24 8z" stroke="#dc2626" stroke-width="2.5" fill="none"/>
            <path d="M24 20v10M24 34v2" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h3>Veri yüklenemedi</h3>
        <p><code>projects.json</code> dosyasını kontrol edin.</p>
      </div>
    </template>

    <footer class="site-foot">
      <div class="foot-rule"></div>
      <p>&copy; MANYETAM &middot; TÜBİTAK Projeleri</p>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="./app.js" defer></script>
</body>
</html>
