<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MANYETAM | Ekibimiz</title>
  <meta name="description" content="MANYETAM ekip sayfası" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="teamWrap py-4">
    <div class="container-xl">
      <header class="teamHeader">
        <p id="teamDescription" class="teamKickerText"></p>
        <h1 id="teamTitle" class="teamTitle"></h1>
        <div class="controlRow">
          <label class="controlLabel" for="categoryFilter">Kategori</label>
          <select id="categoryFilter" class="controlSelect" aria-label="Kategori filtrele">
            <option value="">Tümü</option>
          </select>
        </div>
      </header>

      <div id="teamGroups"></div>
    </div>
  </main>

  <!-- Copy Toast -->
  <div id="copyToast" class="copyToast">Kopyalandı &#10003;</div>

  <template id="groupTemplate">
    <section class="groupSection">
      <div class="teamDivider"></div>
      <div class="groupHead">
        <div>
          <div class="groupOver">Kategori</div>
          <h2 class="groupTitle"></h2>
        </div>
        <span class="groupBadge"></span>
      </div>
      <div class="memberGrid row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3 align-items-start teamGridRow"></div>
    </section>
  </template>

  <template id="memberTemplate">
    <article class="teamCard" tabindex="0" role="button">
      <div class="photoPH"></div>
      <div class="teamBody">
        <div class="teamMainRow">
          <div class="teamMainText">
            <p class="teamName"></p>
            <p class="teamRole"></p>
          </div>
          <button class="expandBtn teamDetailBtn" type="button" data-action="open-detail" aria-expanded="false" aria-label="Üye detayını göster">
            <span>Detay</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
        </div>
        <div class="chipRow"></div>
        <div class="accentLine"></div>
      </div>
      <div class="teamOverlay" aria-hidden="true">
        <button class="teamOverlayClose" type="button" data-action="close-detail" aria-label="Kapat">✕</button>
        <div class="teamOverlayBody"></div>
      </div>
    </article>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
