<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCI Yayınlar | MANYETAM</title>
  <meta name="description" content="MANYETAM SCI yayınlar listesi" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-pattern"></div>

  <header class="hero">
    <div class="container hero-inner">
      <div class="hero-accent"></div>
      <div>
        <p class="eyebrow">MANYETAM</p>
        <h1>SCI Yayınlar</h1>
        <p class="hero-sub">
          Kurumsal yayın listesi • filtrelenebilir • güncellenebilir • GitHub Pages uyumlu
        </p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="toolbar card">
      <div class="toolbar-row">
        <div class="field grow">
          <label for="searchInput">Ara</label>
          <input id="searchInput" type="text" placeholder="Başlık, yazar, dergi, etiket..." />
        </div>

        <div class="field">
          <label for="yearFilter">Yıl</label>
          <select id="yearFilter">
            <option value="">Tümü</option>
          </select>
        </div>

        <div class="field">
          <label for="quartileFilter">Q Sınıfı</label>
          <select id="quartileFilter">
            <option value="">Tümü</option>
            <option value="Q1">Q1</option>
            <option value="Q2">Q2</option>
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
          </select>
        </div>

        <div class="field">
          <label for="sortSelect">Sırala</label>
          <select id="sortSelect">
            <option value="year-desc">Yıl (Yeni → Eski)</option>
            <option value="year-asc">Yıl (Eski → Yeni)</option>
            <option value="title-asc">Başlık (A-Z)</option>
            <option value="journal-asc">Dergi (A-Z)</option>
          </select>
        </div>
      </div>

      <div class="toolbar-footer">
        <div id="resultCount" class="result-count">Yükleniyor...</div>
        <button id="clearBtn" class="btn btn-ghost" type="button">Filtreleri Temizle</button>
      </div>
    </section>

    <section id="list" class="pub-grid" aria-live="polite"></section>

    <template id="emptyState">
      <div class="empty card">
        <h3>Sonuç bulunamadı</h3>
        <p>Filtreleri değiştirip tekrar deneyebilirsin.</p>
      </div>
    </template>

    <template id="errorState">
      <div class="empty card error">
        <h3>Veri yüklenemedi</h3>
        <p><code>publications.json</code> dosyasını ve JSON formatını kontrol et.</p>
      </div>
    </template>
  </main>

  <footer class="container footer">
    <p>© MANYETAM • SCI Publications</p>
  </footer>

  <script src="./app.js" defer></script>
</body>
</html>
