<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <h2 class="text-center fw-bold mb-2">Bize Yazin</h2>
      <p class="text-center text-muted mb-4">Sorulariniz ve onerileriniz icin bize ulasabilirsiniz.</p>

      <form>
        <div class="row mb-3">
          <div class="col-md-6 mb-3 mb-md-0">
            <label class="form-label fw-semibold" for="fullName">Ad Soyad *</label>
            <input type="text" class="form-control" id="fullName" placeholder="Adiniz Soyadiniz" required />
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="email">E-posta *</label>
            <input type="email" class="form-control" id="email" placeholder="ornek@mail.com" required />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6 mb-3 mb-md-0">
            <label class="form-label fw-semibold" for="phone">Telefon</label>
            <input type="tel" class="form-control" id="phone" placeholder="05XX XXX XX XX" />
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="subject">Konu *</label>
            <select class="form-select" id="subject" required>
              <option value="" selected disabled>Konu seciniz...</option>
              <option value="genel">Genel Bilgi</option>
              <option value="isbirligi">Isbirligi Talebi</option>
              <option value="proje">Proje Basvurusu</option>
              <option value="staj">Staj Basvurusu</option>
              <option value="diger">Diger</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold" for="message">Mesajiniz *</label>
          <textarea class="form-control" id="message" rows="5" placeholder="Mesajinizi buraya yaziniz..." required></textarea>
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="kvkk" required />
          <label class="form-check-label" for="kvkk">Kisisel verilerimin islenmesine iliskin aydinlatma metnini okudum ve kabul ediyorum. *</label>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold">Gonder</button>
        </div>
      </form>

    </div>
  </div>
</div>
